<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EFEEE9">
<title>순간 영작 드릴</title>
<style>
  :root{
    --bg:#EFEEE9; --card:#FFFFFF; --ink:#1F2421; --sub:#6B6F6A;
    --accent:#2F6F5E; --again:#B5562E; --border:rgba(31,36,33,.10);
    --soft:#F4F3EE; --accent-soft:rgba(47,111,94,.10); --again-soft:rgba(181,86,46,.10);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#16181A; --card:#1E2123; --ink:#ECEAE3; --sub:#9A9D98;
      --accent:#5FB89E; --again:#D98A5F; --border:rgba(255,255,255,.11);
      --soft:#24272A; --accent-soft:rgba(95,184,158,.14); --again-soft:rgba(217,138,95,.14);
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:480px; padding:18px 18px 40px; display:flex; flex-direction:column; min-height:100vh;}

  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .brand{font-size:15px; font-weight:600; letter-spacing:-.01em;}
  .brand small{font-weight:400; color:var(--sub); font-size:12px; margin-left:6px;}
  .reset{font-size:12px; color:var(--sub); background:none; border:none; padding:6px; cursor:pointer;}

  .levels{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:16px;}
  .lv{
    border:1px solid var(--border); background:var(--card); border-radius:11px;
    padding:9px 4px; text-align:center; cursor:pointer; transition:.15s;
  }
  .lv .n{font-size:14px; font-weight:600;}
  .lv .m{font-size:10.5px; color:var(--sub); margin-top:2px; font-variant-numeric:tabular-nums;}
  .lv.active{background:var(--accent); border-color:var(--accent);}
  .lv.active .n{color:#fff;} .lv.active .m{color:rgba(255,255,255,.85);}
  @media (prefers-color-scheme: dark){ .lv.active .n,.lv.active .m{color:#10211C;} }

  .meta{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; font-size:12.5px; color:var(--sub);}
  .meta .pos{font-variant-numeric:tabular-nums; font-weight:600; color:var(--ink);}
  .track{height:4px; background:var(--soft); border-radius:99px; overflow:hidden; margin-bottom:18px;}
  .fill{height:100%; width:2%; background:var(--accent); border-radius:99px; transition:width .25s;}

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:30px 22px; flex:1; display:flex; flex-direction:column; justify-content:center;
    min-height:200px; text-align:center;
  }
  .ko{font-size:25px; font-weight:600; letter-spacing:-.015em; margin:0;}
  .ans{margin-top:20px; padding-top:18px; border-top:1px solid var(--border); display:none;}
  .ans.show{display:block; animation:rise .2s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;}}
  .en{font-size:21px; font-weight:600; color:var(--accent); margin:0; letter-spacing:-.01em;}
  .hint{margin-top:9px; font-size:12px; color:var(--sub);}

  .controls{margin-top:16px;}
  button{font-family:inherit;}
  .reveal{
    width:100%; padding:15px; border-radius:13px; border:none;
    background:var(--accent); color:#fff; font-size:15.5px; font-weight:600; cursor:pointer;
  }
  @media (prefers-color-scheme: dark){ .reveal{color:#10211C;} }
  .judge{display:none; gap:10px;}
  .judge.show{display:flex;}
  .jbtn{
    flex:1; padding:15px; border-radius:13px; font-size:15.5px; font-weight:600; cursor:pointer;
    background:var(--card);
  }
  .jbtn.again{border:1.5px solid var(--again); color:var(--again);}
  .jbtn.again:active{background:var(--again-soft);}
  .jbtn.got{border:1.5px solid var(--accent); color:var(--accent);}
  .jbtn.got:active{background:var(--accent-soft);}

  .nav{display:flex; justify-content:space-between; margin-top:14px;}
  .nav button{
    background:none; border:none; color:var(--sub); font-size:13.5px; font-weight:500;
    padding:8px 4px; cursor:pointer; display:flex; align-items:center; gap:5px;
  }
  .nav svg{width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

  .done{
    background:var(--soft); border-radius:16px; padding:24px 20px; text-align:center; display:none;
    flex:1; flex-direction:column; justify-content:center;
  }
  .done.show{display:flex;}
  .done h2{margin:0 0 6px; font-size:19px; font-weight:600;}
  .done p{margin:0; font-size:14px; color:var(--sub);}
  .done .row{display:flex; gap:10px; margin-top:18px; justify-content:center;}
  .done .row button{
    padding:11px 16px; border-radius:11px; border:1px solid var(--border);
    background:var(--card); color:var(--ink); font-size:13.5px; font-weight:600; cursor:pointer;
  }
  .done .row button.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  @media (prefers-color-scheme: dark){ .done .row button.primary{color:#10211C;} }

  .note{margin-top:18px; font-size:11.5px; color:var(--sub); text-align:center; line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">순간 영작 <small>한국어 → 1초 안에 영어로</small></div>
    <button class="reset" id="resetBtn">진도 초기화</button>
  </header>

  <div class="levels" id="levels"></div>

  <div class="meta">
    <span class="pos" id="pos">1 / 50</span>
    <span id="mastered">완료 0</span>
  </div>
  <div class="track"><div class="fill" id="fill"></div></div>

  <div class="card" id="card">
    <p class="ko" id="ko">나 배고파.</p>
    <div class="ans" id="ans">
      <p class="en" id="en">I'm hungry.</p>
      <p class="hint" id="hint"></p>
    </div>
  </div>

  <div class="done" id="done">
    <h2>한 바퀴 끝!</h2>
    <p id="score"></p>
    <div class="row">
      <button id="redoMissed">막힌 것만 다시</button>
      <button class="primary" id="redoAll">처음부터 다시</button>
    </div>
  </div>

  <div class="controls">
    <button class="reveal" id="reveal">
      <svg style="width:17px;height:17px;vertical-align:-3px;margin-right:6px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      정답 보기
    </button>
    <div class="judge" id="judge">
      <button class="jbtn again" id="again">다시 막힘</button>
      <button class="jbtn got" id="got">바로 나옴</button>
    </div>
    <div class="nav">
      <button id="prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>이전</button>
      <button id="shuffle"><svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>섞기</button>
    </div>
  </div>

  <p class="note">한국어를 보고 입으로 영어를 뱉은 뒤 정답을 확인하세요.<br>인터넷 없이 작동하며, 진도는 이 기기에 저장됩니다.</p>
</div>

    ["이거 매워요?","Is this spicy?"],
    ["따로따로 계산할게요.","We'll pay separately."],
    ["계산서 주세요.","Can I get the bill?"],
    ["잔돈은 괜찮아요.","Keep the change."]
  ]}
};

const STORE_KEY = "gordon_drill_v1";
let saved = {};
try { saved = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ saved = {}; }
function persist(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(saved)); } catch(e){} }
function masteredSet(lv){ saved[lv] = saved[lv] || []; return new Set(saved[lv]); }

let curLv = 1;
let order = [];
let pos = 0;
let missed = new Set();
let gotThisRound = new Set();

const $ = id => document.getElementById(id);
const elLevels=$("levels"), elKo=$("ko"), elEn=$("en"), elAns=$("ans"), elHint=$("hint"),
      elPos=$("pos"), elFill=$("fill"), elMastered=$("mastered"), elCard=$("card"),
      elReveal=$("reveal"), elJudge=$("judge"), elDone=$("done"), elScore=$("score");

function buildLevels(){
  elLevels.innerHTML = "";
  [1,2,3,4].forEach(lv=>{
    const total = SETS[lv].items.length;
    const done = masteredSet(lv).size;
    const d = document.createElement("div");
    d.className = "lv" + (lv===curLv?" active":"");
    d.innerHTML = `<div class="n">L${lv}</div><div class="m">${done}/${total}</div>`;
    d.onclick = ()=>{ curLv=lv; startRound("all"); buildLevels(); };
    elLevels.appendChild(d);
  });
}

function startRound(mode){
  const items = SETS[curLv].items;
  const done = masteredSet(curLv);
  if(mode==="missed"){
    order = [...missed];
  } else if(mode==="remaining"){
    order = items.map((_,i)=>i).filter(i=>!done.has(i));
    if(order.length===0) order = items.map((_,i)=>i);
  } else {
    order = items.map((_,i)=>i);
  }
  missed = new Set();
  gotThisRound = new Set();
  pos = 0;
  elDone.classList.remove("show");
  elCard.style.display = "flex";
  document.querySelector(".controls").style.display = "block";
  render();
}

function render(){
  const idx = order[pos];
  const it = SETS[curLv].items[idx];
  elKo.textContent = it[0];
  elEn.textContent = it[1];
  elHint.textContent = masteredSet(curLv).has(idx) ? "✓ 이미 완료한 문장" : "";
  elAns.classList.remove("show");
  elReveal.style.display = "block";
  elJudge.classList.remove("show");
  elPos.textContent = (pos+1) + " / " + order.length;
  elMastered.textContent = "완료 " + masteredSet(curLv).size + "/" + SETS[curLv].items.length;
  elFill.style.width = Math.round(((pos+1)/order.length)*100) + "%";
}

function reveal(){
  elAns.classList.add("show");
  elReveal.style.display = "none";
  elJudge.classList.add("show");
}

function advance(){
  if(pos < order.length-1){ pos++; render(); }
  else finish();
}

function finish(){
  elCard.style.display = "none";
  document.querySelector(".controls").style.display = "none";
  elScore.textContent = "바로 나옴 " + gotThisRound.size + "개 · 막힘 " + missed.size + "개";
  elDone.classList.add("show");
  elFill.style.width = "100%";
  buildLevels();
}

elReveal.onclick = reveal;
$("got").onclick = ()=>{
  const idx = order[pos];
  gotThisRound.add(idx);
  const set = masteredSet(curLv);
  set.add(idx); saved[curLv] = [...set]; persist();
  missed.delete(idx);
  advance();
};
$("again").onclick = ()=>{
  const idx = order[pos];
  missed.add(idx);
  const set = masteredSet(curLv);
  if(set.has(idx)){ set.delete(idx); saved[curLv] = [...set]; persist(); }
  advance();
};
$("prev").onclick = ()=>{ if(pos>0){ pos--; render(); } };
$("shuffle").onclick = ()=>{
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  pos=0; render();
};
$("redoMissed").onclick = ()=>{ if(missed.size>0){ startRound("missed"); } else { startRound("all"); } };
$("redoAll").onclick = ()=> startRound("all");
$("resetBtn").onclick = ()=>{
  if(confirm("이 레벨의 완료 기록을 지울까요?")){
    saved[curLv] = []; persist(); buildLevels(); startRound("all");
  }
};

buildLevels();
startRound("all");
</script>
</body>
</html>
